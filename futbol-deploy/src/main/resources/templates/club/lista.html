<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Clubes | Fútbol Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/estilo.css}" rel="stylesheet"/>
</head>
<body class="bg-light d-flex flex-column min-vh-100">
<div th:replace="~{layout :: navbar}"></div>
<main class="container my-4 flex-grow-1">
    <div th:replace="~{layout :: alertas}"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="fw-bold"><i class="bi bi-shield-fill text-success me-2"></i>Clubes</h2>
        <a th:href="@{/clubes/nuevo}" class="btn btn-success"><i class="bi bi-plus-circle me-1"></i>Nuevo Club</a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div th:if="${clubes.isEmpty()}" class="text-center py-5 text-muted">
                <i class="bi bi-shield display-4 d-block mb-2"></i><p>No hay clubes registrados.</p>
            </div>
            <div th:unless="${clubes.isEmpty()}" class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-success">
                    <tr>
                        <th>#</th><th>Club</th><th>Ciudad</th><th>Fundación</th>
                        <th>Estadio</th><th>Entrenador</th><th>Asociación</th><th class="text-center">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c, i : ${clubes}">
                        <td class="text-muted small" th:text="${i.count}"></td>
                        <td class="fw-semibold" th:text="${c.nombre}"></td>
                        <td th:text="${c.ciudad}"></td>
                        <td th:text="${c.fundacion}"></td>
                        <td th:text="${c.estadio ?: '—'}"></td>
                        <td th:text="${c.entrenador != null ? c.entrenador.nombreCompleto : '—'}"></td>
                        <td th:text="${c.asociacion != null ? c.asociacion.nombre : '—'}"></td>
                        <td class="text-center">
                            <a th:href="@{/clubes/{id}(id=${c.id})}" class="btn btn-sm btn-outline-info me-1" title="Ver"><i class="bi bi-eye"></i></a>
                            <a th:href="@{/clubes/{id}/editar(id=${c.id})}" class="btn btn-sm btn-outline-warning me-1" title="Editar"><i class="bi bi-pencil"></i></a>
                            <form th:action="@{/clubes/{id}/eliminar(id=${c.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('¿Eliminar este club?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
