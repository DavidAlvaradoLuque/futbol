<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${club.nombre} + ' | Fútbol Manager'">Club</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/estilo.css}" rel="stylesheet"/>
</head>
<body class="bg-light d-flex flex-column min-vh-100">
<div th:replace="~{layout :: navbar}"></div>
<main class="container my-4 flex-grow-1">
    <div th:replace="~{layout :: alertas}"></div>
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/clubes}">Clubes</a></li>
            <li class="breadcrumb-item active" th:text="${club.nombre}"></li>
        </ol>
    </nav>
    <div class="row g-4">
        <!-- Info principal -->
        <div class="col-md-5">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-success text-white text-center py-4">
                    <i class="bi bi-shield-fill display-4 d-block mb-1"></i>
                    <h4 class="fw-bold mb-0" th:text="${club.nombre}"></h4>
                    <small th:text="${club.ciudad}"></small>
                </div>
                <div class="card-body">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item"><i class="bi bi-calendar3 text-success me-2"></i><strong>Fundado:</strong> <span th:text="${club.fundacion}"></span></li>
                        <li class="list-group-item"><i class="bi bi-geo-alt text-success me-2"></i><strong>Estadio:</strong> <span th:text="${club.estadio ?: '—'}"></span></li>
                        <li class="list-group-item"><i class="bi bi-person-video3 text-success me-2"></i><strong>Entrenador:</strong>
                            <span th:text="${club.entrenador != null ? club.entrenador.nombreCompleto : '—'}"></span>
                        </li>
                        <li class="list-group-item"><i class="bi bi-building text-success me-2"></i><strong>Asociación:</strong>
                            <span th:text="${club.asociacion != null ? club.asociacion.nombre : '—'}"></span>
                        </li>
                    </ul>
                </div>
                <div class="card-footer bg-transparent d-flex gap-2">
                    <a th:href="@{/clubes/{id}/editar(id=${club.id})}" class="btn btn-warning flex-fill"><i class="bi bi-pencil me-1"></i>Editar</a>
                    <form th:action="@{/clubes/{id}/eliminar(id=${club.id})}" method="post" class="flex-fill"
                          onsubmit="return confirm('¿Eliminar este club?')">
                        <button class="btn btn-danger w-100"><i class="bi bi-trash me-1"></i>Eliminar</button>
                    </form>
                    <a th:href="@{/clubes}" class="btn btn-outline-secondary flex-fill"><i class="bi bi-arrow-left me-1"></i>Volver</a>
                </div>
            </div>
        </div>
        <!-- Jugadores y Competiciones -->
        <div class="col-md-7">
            <!-- Jugadores -->
            <div class="card shadow-sm mb-3">
                <div class="card-header bg-light fw-bold"><i class="bi bi-person-fill me-2 text-success"></i>Jugadores del plantel</div>
                <div class="card-body p-0">
                    <div th:if="${club.jugadores == null or club.jugadores.isEmpty()}" class="text-muted p-3 text-center">Sin jugadores registrados</div>
                    <table th:unless="${club.jugadores == null or club.jugadores.isEmpty()}" class="table table-sm mb-0">
                        <thead class="table-light"><tr><th>#</th><th>Nombre</th><th>Número</th><th>Posición</th></tr></thead>
                        <tbody>
                        <tr th:each="j, i : ${club.jugadores}">
                            <td th:text="${i.count}"></td>
                            <td th:text="${j.nombreCompleto}"></td>
                            <td><span class="badge bg-success" th:text="${j.numero}"></span></td>
                            <td th:text="${j.posicion}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- Competiciones -->
            <div class="card shadow-sm">
                <div class="card-header bg-light fw-bold"><i class="bi bi-cup-fill me-2 text-warning"></i>Competiciones</div>
                <div class="card-body">
                    <div th:if="${club.competiciones == null or club.competiciones.isEmpty()}" class="text-muted">Sin competiciones asignadas</div>
                    <span th:each="comp : ${club.competiciones}"
                          th:text="${comp.nombre}"
                          class="badge bg-warning text-dark me-1 mb-1 fs-6"></span>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
