<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${modoEdicion} ? 'Editar Club' : 'Nuevo Club'">Club</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/estilo.css}" rel="stylesheet"/>
</head>
<body class="bg-light d-flex flex-column min-vh-100">
<div th:replace="~{layout :: navbar}"></div>
<main class="container my-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/clubes}">Clubes</a></li>
                    <li class="breadcrumb-item active" th:text="${modoEdicion} ? 'Editar' : 'Nuevo'"></li>
                </ol>
            </nav>
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">
                        <i th:class="${modoEdicion} ? 'bi bi-pencil-square me-2' : 'bi bi-plus-circle me-2'"></i>
                        <span th:text="${modoEdicion} ? 'Editar Club' : 'Nuevo Club'"></span>
                    </h5>
                </div>
                <div class="card-body">
                    <form th:action="${modoEdicion} ? @{/clubes/{id}/editar(id=${club.id})} : @{/clubes/nuevo}"
                          th:object="${club}" method="post" novalidate>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{nombre}" class="form-control"
                                       th:classappend="${#fields.hasErrors('nombre')} ? ' is-invalid' : ''"
                                       placeholder="Ej: Millonarios FC"/>
                                <div class="invalid-feedback" th:errors="*{nombre}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Ciudad <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{ciudad}" class="form-control"
                                       th:classappend="${#fields.hasErrors('ciudad')} ? ' is-invalid' : ''"
                                       placeholder="Ej: Bogotá"/>
                                <div class="invalid-feedback" th:errors="*{ciudad}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Año de Fundación <span class="text-danger">*</span></label>
                                <input type="number" th:field="*{fundacion}" class="form-control"
                                       th:classappend="${#fields.hasErrors('fundacion')} ? ' is-invalid' : ''"
                                       placeholder="Ej: 1946"/>
                                <div class="invalid-feedback" th:errors="*{fundacion}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Estadio</label>
                                <input type="text" th:field="*{estadio}" class="form-control" placeholder="Ej: El Campín"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Entrenador (@OneToOne)</label>
                                <select th:field="*{entrenador}" class="form-select">
                                    <option value="">-- Sin entrenador --</option>
                                    <option th:each="e : ${entrenadores}"
                                            th:value="${e.id}"
                                            th:text="${e.nombreCompleto}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Asociación (@ManyToOne)</label>
                                <select th:field="*{asociacion}" class="form-select">
                                    <option value="">-- Sin asociación --</option>
                                    <option th:each="a : ${asociaciones}"
                                            th:value="${a.id}"
                                            th:text="${a.nombre}"></option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Competiciones (@ManyToMany)</label>
                                <div class="row">
                                    <div th:each="comp : ${competiciones}" class="col-md-6">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox"
                                                   name="competicionIds"
                                                   th:value="${comp.id}"
                                                   th:checked="${club.competiciones != null and club.competiciones.contains(comp)}"/>
                                            <label class="form-check-label" th:text="${comp.nombre}"></label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-success">
                                <i th:class="${modoEdicion} ? 'bi bi-save me-1' : 'bi bi-plus-circle me-1'"></i>
                                <span th:text="${modoEdicion} ? 'Guardar cambios' : 'Crear club'"></span>
                            </button>
                            <a th:href="@{/clubes}" class="btn btn-outline-secondary"><i class="bi bi-x-circle me-1"></i>Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
