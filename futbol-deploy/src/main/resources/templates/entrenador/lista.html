<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Entrenadores | Fútbol Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/estilo.css}" rel="stylesheet"/>
</head>
<body class="bg-light d-flex flex-column min-vh-100">
<div th:replace="~{layout :: navbar}"></div>
<main class="container my-4 flex-grow-1">
    <div th:replace="~{layout :: alertas}"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="fw-bold"><i class="bi bi-person-video3 text-success me-2"></i>Entrenadores</h2>
        <a th:href="@{/entrenadores/nuevo}" class="btn btn-success"><i class="bi bi-plus-circle me-1"></i>Nuevo Entrenador</a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div th:if="${entrenadores.isEmpty()}" class="text-center py-5 text-muted">
                <i class="bi bi-person-video3 display-4 d-block mb-2"></i><p>No hay entrenadores registrados.</p>
            </div>
            <div th:unless="${entrenadores.isEmpty()}" class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-success">
                    <tr><th>#</th><th>Nombre</th><th>Edad</th><th>Nacionalidad</th><th>Club</th><th class="text-center">Acciones</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="e, i : ${entrenadores}">
                        <td class="text-muted small" th:text="${i.count}"></td>
                        <td class="fw-semibold" th:text="${e.nombreCompleto}"></td>
                        <td th:text="${e.edad}"></td>
                        <td th:text="${e.nacionalidad}"></td>
                        <td th:text="${e.club != null ? e.club.nombre : '—'}"></td>
                        <td class="text-center">
                            <a th:href="@{/entrenadores/{id}/editar(id=${e.id})}" class="btn btn-sm btn-outline-warning me-1"><i class="bi bi-pencil"></i></a>
                            <form th:action="@{/entrenadores/{id}/eliminar(id=${e.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('¿Eliminar entrenador?')">
                                <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
