<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/estilo.css}" rel="stylesheet"/>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-success shadow">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" th:href="@{/}">
            <i class="bi bi-trophy-fill me-2"></i>Fútbol Manager
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/clubes}"><i class="bi bi-shield-fill me-1"></i>Clubes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/jugadores}"><i class="bi bi-person-fill me-1"></i>Jugadores</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/entrenadores}"><i class="bi bi-person-video3 me-1"></i>Entrenadores</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/asociaciones}"><i class="bi bi-building me-1"></i>Asociaciones</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/competiciones}"><i class="bi bi-cup-fill me-1"></i>Competiciones</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div th:fragment="alertas" class="container mt-3">
    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${exito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<footer th:fragment="footer" class="footer mt-auto py-3 bg-white border-top">
    <div class="container text-center text-muted small">
        <i class="bi bi-trophy me-1"></i>Fútbol Manager &mdash; Spring Boot + JPA + Thymeleaf
        &nbsp;|&nbsp;
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
