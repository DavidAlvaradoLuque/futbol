<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${modoEdicion} ? 'Editar Jugador' : 'Nuevo Jugador'">Jugador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/estilo.css}" rel="stylesheet"/>
</head>
<body class="bg-light d-flex flex-column min-vh-100">
<div th:replace="~{layout :: navbar}"></div>
<main class="container my-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/jugadores}">Jugadores</a></li>
                    <li class="breadcrumb-item active" th:text="${modoEdicion} ? 'Editar' : 'Nuevo'"></li>
                </ol>
            </nav>
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="bi bi-person-fill me-2"></i>
                        <span th:text="${modoEdicion} ? 'Editar Jugador' : 'Nuevo Jugador'"></span>
                    </h5>
                </div>
                <div class="card-body">
                    <form th:action="${modoEdicion} ? @{/jugadores/{id}/editar(id=${jugador.id})} : @{/jugadores/nuevo}"
                          th:object="${jugador}" method="post" novalidate>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{nombre}" class="form-control"
                                       th:classappend="${#fields.hasErrors('nombre')} ? ' is-invalid' : ''"/>
                                <div class="invalid-feedback" th:errors="*{nombre}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Apellido <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{apellido}" class="form-control"
                                       th:classappend="${#fields.hasErrors('apellido')} ? ' is-invalid' : ''"/>
                                <div class="invalid-feedback" th:errors="*{apellido}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Número (1-99)</label>
                                <input type="number" th:field="*{numero}" class="form-control" min="1" max="99"/>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Posición <span class="text-danger">*</span></label>
                                <select th:field="*{posicion}" class="form-select"
                                        th:classappend="${#fields.hasErrors('posicion')} ? ' is-invalid' : ''">
                                    <option value="">-- Seleccionar --</option>
                                    <option value="Portero">Portero</option>
                                    <option value="Defensa">Defensa</option>
                                    <option value="Mediocampista">Mediocampista</option>
                                    <option value="Delantero">Delantero</option>
                                    <option value="Extremo">Extremo</option>
                                </select>
                                <div class="invalid-feedback" th:errors="*{posicion}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Club (@ManyToOne)</label>
                                <select th:field="*{club}" class="form-select">
                                    <option value="">-- Sin club --</option>
                                    <option th:each="c : ${clubes}" th:value="${c.id}" th:text="${c.nombre}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-success">
                                <i th:class="${modoEdicion} ? 'bi bi-save me-1' : 'bi bi-plus-circle me-1'"></i>
                                <span th:text="${modoEdicion} ? 'Guardar cambios' : 'Registrar jugador'"></span>
                            </button>
                            <a th:href="@{/jugadores}" class="btn btn-outline-secondary"><i class="bi bi-x-circle me-1"></i>Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
