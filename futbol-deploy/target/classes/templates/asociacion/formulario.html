<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${modoEdicion} ? 'Editar Asociación' : 'Nueva Asociación'">Asociación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link th:href="@{/css/estilo.css}" rel="stylesheet"/>
</head>
<body class="bg-light d-flex flex-column min-vh-100">
<div th:replace="~{layout :: navbar}"></div>
<main class="container my-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/asociaciones}">Asociaciones</a></li>
                    <li class="breadcrumb-item active" th:text="${modoEdicion} ? 'Editar' : 'Nueva'"></li>
                </ol>
            </nav>
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="bi bi-building me-2"></i>
                        <span th:text="${modoEdicion} ? 'Editar Asociación' : 'Nueva Asociación'"></span>
                    </h5>
                </div>
                <div class="card-body">
                    <form th:action="${modoEdicion} ? @{/asociaciones/{id}/editar(id=${asociacion.id})} : @{/asociaciones/nuevo}"
                          th:object="${asociacion}" method="post" novalidate>
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{nombre}" class="form-control"
                                       th:classappend="${#fields.hasErrors('nombre')} ? ' is-invalid' : ''"/>
                                <div class="invalid-feedback" th:errors="*{nombre}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">País <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{pais}" class="form-control"
                                       th:classappend="${#fields.hasErrors('pais')} ? ' is-invalid' : ''"/>
                                <div class="invalid-feedback" th:errors="*{pais}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Presidente <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{presidente}" class="form-control"
                                       th:classappend="${#fields.hasErrors('presidente')} ? ' is-invalid' : ''"/>
                                <div class="invalid-feedback" th:errors="*{presidente}"></div>
                            </div>
                        </div>
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-success">
                                <i th:class="${modoEdicion} ? 'bi bi-save me-1' : 'bi bi-plus-circle me-1'"></i>
                                <span th:text="${modoEdicion} ? 'Guardar cambios' : 'Crear asociación'"></span>
                            </button>
                            <a th:href="@{/asociaciones}" class="btn btn-outline-secondary"><i class="bi bi-x-circle me-1"></i>Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
